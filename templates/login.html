<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONBLEU | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="col-md-5 col-lg-4">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-boxes fa-3x mb-3" style="color: #667eea;"></i>
                <h3>MONBLEU</h3>
                <p>Sistema de Gestión de Stock</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <div>{{ msg }}</div>
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-user me-2"></i>Usuario
                    </label>
                    <input class="form-control" name="usuario" placeholder="Ingrese su usuario" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">
                        <i class="fas fa-lock me-2"></i>Contraseña
                    </label>
                    <input class="form-control" name="password" type="password" placeholder="Ingrese su contraseña" required>
                </div>
                <button class="btn btn-dark w-100 py-3" type="submit">
                    <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
