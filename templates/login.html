<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MONBLEU | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>

<div class="login-container">
    <div class="login-aside shadow">
        <div class="aside-content">
            <h1>MONBLEU</h1>
            <p>Plataforma Enterprise de Control de Inventario y Producción Maquilera.</p>
            <div class="glass-decoration"></div>
        </div>
    </div>
    <div class="login-main">
        <div class="login-card">
            <h3 class="login-title">Bienvenido</h3>
            <p class="text-muted mb-4" style="font-size: 1.1rem;">Ingresa tus credenciales para acceder</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} shadow-sm fw-bold">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            <form method="post">
                <div class="mb-3 input-group-custom">
                    <input class="form-control" name="usuario" placeholder="Usuario" required>
                </div>
                <div class="mb-4 input-group-custom">
                    <input class="form-control" name="password" type="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-login w-100 py-3 fw-bold">Entrar al Sistema</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
