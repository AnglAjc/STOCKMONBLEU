<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MONBLEU | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h3 class="login-logo">MONBLEU</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
                <div class="alert alert-{{ category }} shadow-sm">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post">
            <div class="mb-3">
                <input class="form-control" name="usuario" placeholder="Usuario" required>
            </div>
            <div class="mb-4">
                <input class="form-control" name="password" type="password" placeholder="Contraseña" required>
            </div>
            <button class="btn btn-dark w-100 py-2">Entrar al Sistema</button>
        </form>
    </div>
</div>

</body>
</html>
