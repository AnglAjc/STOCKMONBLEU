<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Faltantes Jueves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">MONBLEU – Faltantes</span>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Book Stock</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Salir</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="glass-panel">
        <h4 class="mb-4">🚨 Faltantes de Jueves</h4>
        <div class="table-container">
            <table class="table table-bordered table-sm align-middle">
                <thead class="table-dark text-center">
                <tr>
                    <th>Producto</th>
                    <th>CH</th>
                    <th>M</th>
                    <th>L</th>
                    <th>XL</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody>
                {% for f in data %}
                <tr class="text-center">
                    <form method="post" action="/faltantes/editar/{{ f.id }}">
                        <td class="text-start fw-semibold ps-3">{{ f.producto }}</td>
                        <td><input class="form-control form-control-sm text-center mx-auto shadow-sm" style="max-width: 60px;" name="ch" value="{{ f.ch }}"></td>
                        <td><input class="form-control form-control-sm text-center mx-auto shadow-sm" style="max-width: 60px;" name="m" value="{{ f.m }}"></td>
                        <td><input class="form-control form-control-sm text-center mx-auto shadow-sm" style="max-width: 60px;" name="l" value="{{ f.l }}"></td>
                        <td><input class="form-control form-control-sm text-center mx-auto shadow-sm" style="max-width: 60px;" name="xl" value="{{ f.xl }}"></td>
                        <td>
                            <button class="btn btn-sm btn-primary px-3 fw-bold shadow-sm">Guardar</button>
                        </td>
                    </form>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
