<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faltantes | MONBLEU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">
        <i class="fas fa-exclamation-triangle me-2"></i>MONBLEU – Faltantes
    </span>
    <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-light btn-sm">
            <i class="fas fa-home me-1"></i>Book Stock
        </a>
        <a href="/logout" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt me-1"></i>Salir
        </a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
            <div class="alert alert-{{ category }} d-flex align-items-center mb-3" role="alert">
                <i class="fas fa-info-circle me-2"></i>
                <div>{{ msg }}</div>
            </div>
        {% endfor %}
    {% endwith %}

    <h2 class="section-title">
        <i class="fas fa-clipboard-list me-2"></i>Registro de Faltantes
    </h2>

    <div style="overflow-x: auto;">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark text-center">
                <tr>
                    <th><i class="fas fa-tag me-2"></i>Producto</th>
                    <th><i class="fas fa-sort-amount-down me-1"></i>CH</th>
                    <th><i class="fas fa-sort-amount-down me-1"></i>M</th>
                    <th><i class="fas fa-sort-amount-down me-1"></i>L</th>
                    <th><i class="fas fa-sort-amount-down me-1"></i>XL</th>
                    <th><i class="fas fa-save me-1"></i>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for f in data %}
                <tr>
                    <form method="post" action="/faltantes/editar/{{ f.id }}">
                        <td class="text-start">
                            <strong>{{ f.producto }}</strong>
                        </td>
                        <td>
                            <input class="form-control form-control-sm text-center" 
                                   name="ch" value="{{ f.ch }}" type="number" min="0">
                        </td>
                        <td>
                            <input class="form-control form-control-sm text-center" 
                                   name="m" value="{{ f.m }}" type="number" min="0">
                        </td>
                        <td>
                            <input class="form-control form-control-sm text-center" 
                                   name="l" value="{{ f.l }}" type="number" min="0">
                        </td>
                        <td>
                            <input class="form-control form-control-sm text-center" 
                                   name="xl" value="{{ f.xl }}" type="number" min="0">
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-primary">
                                <i class="fas fa-save me-1"></i>Guardar
                            </button>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
